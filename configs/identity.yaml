# Slot principal — máquina de estados con histéresis (plan M2, r2 #9; autoauditoría #5)
# El slot estable está separado del track_id efímero de ByteTrack.

slot:
  max_slots: 8                # personas simultáneas (contrato 1.1; decisión del usuario)
  # El incumbente retiene el slot mientras su track sea válido; se libera SOLO tras timeout.
  occlusion_grace_ms: 1500    # tolerancia de oclusión antes de considerar perdido al incumbente
  release_timeout_ms: 3000    # tras esto el slot se libera y puede reacquirir
  acquire_rule: "largest_bbox"  # desempate determinista al reacquirir: largest_bbox | most_central
  auto_focus_switch_ratio: 1.20   # el nuevo mayor debe superar 20% al foco actual
  # r8 #1 — lifecycle robusto a UDP
  tombstone_repeat_frames: 15   # el present=0 se repite N frames
  receiver_lease_ms: 2000       # lease recomendado al receptor (documentado en el contrato)

# H4a capa 3 — matcher de reasociación de slots (capa auditable propia).
# Cuando aparece un track NUEVO y hay slots ocluidos/perdiéndose, se intenta
# re-bindear el track al slot ausente por posición predicha + tamaño + borde.
reacquisition:
  enabled: true                 # (los modos lo sobreescriben)
  max_pred_dist: 0.35           # distancia máx (fracción del alto) a la posición
                                # predicha (pos + vel×Δt); crece con la incertidumbre:
  pred_dist_growth_per_s: 0.15  # ensanche del gate por segundo de ausencia
  size_ratio_max: 1.8           # ratio máx entre áreas de bbox (viejo vs nuevo)
  edge_margin: 0.06             # bbox tocando borde a menos de esto = "salió por borde"
  edge_gate_dist: 0.30          # si salió por un borde, la reaparición debe estar
                                # a menos de esto del MISMO borde
  teleport_reset_dist: 0.25     # salto > esto (fracción del alto) al re-bindear →
                                # reset de One-Euro + buffers de features (derivadas
                                # espurias si no)

